services:
  # FastAPI application
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-agent-backend
    env_file:
      - .env
    ports:
      # Your computer's port 8000 -> container port 8000
      - "${BACKEND_BIND:-127.0.0.1}:${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend/src:/app
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # MySQL database
  db:
    image: mysql:8.0
    container_name: ai_agent_mysql
    environment:
      MYSQL_DATABASE: ai_agent_db
      MYSQL_USER: ai_user
      MYSQL_PASSWORD: ai_password
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      # Connect from your PC on port 3307; MySQL uses 3306 inside Docker.
      - "127.0.0.1:3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    restart: unless-stopped

volumes:
  mysql_data:
